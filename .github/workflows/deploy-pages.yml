name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pandoc
        run: sudo apt-get install -y pandoc

      - name: Build site
        run: |
          mkdir -p site/docs site/css

          # Static root assets
          cp index.html site/index.html
          cp CNAME site/CNAME
          touch site/.nojekyll

          # Stylesheet
          cp docs/assets/css/docs.css site/css/docs.css

          # Render each top-level markdown file under docs/ to HTML.
          # Output lands at site/docs/<name>.html; CSS is one level up.
          render_md() {
            local src="$1"
            local rel="${src#docs/}"
            local out="site/docs/${rel%.md}.html"
            local title
            title=$(grep -m1 '^# ' "$src" | sed 's/^# //')
            mkdir -p "$(dirname "$out")"
            pandoc "$src" \
              --standalone \
              --metadata title="" \
              --metadata pagetitle="$title" \
              --css "../css/docs.css" \
              -o "$out"
          }

          for md in docs/*.md; do
            [ -f "$md" ] || continue
            render_md "$md"
          done

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
